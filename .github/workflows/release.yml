name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.event.head_commit.message, 'release:') ||
      startsWith(github.event.head_commit.message, 'Release:')

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Keystore base64 found, decoding to release.keystore..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          else
            echo "No keystore base64 found, build will fall back to debug signing key."
          fi
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrnado-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
